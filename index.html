  <script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxsl06jAmNEIFDQDNixZOk13vnob0hIbkPlL4JQt64mShLyD7IeXWY5lUfwPBhlkkTF0w/exec';
    
    let msgState = {
        show: false,
        type: 'alert',
        message: '',
        confirmCallback: null
    };

    function showCustomAlert(message) {
        msgState = { show: true, type: 'alert', message: message, confirmCallback: null };
        render();
    }

    function showCustomConfirm(message, callback) {
        msgState = { show: true, type: 'confirm', message: message, confirmCallback: callback };
        render();
    }

    function closeMessageBox() {
        msgState = { show: false, type: 'alert', message: '', confirmCallback: null };
        render();
    }

    async function setSyncing(val) {
      state.syncing = val;
      render();
      // 브라우저가 DOM을 실제로 업데이트할 시간을 줌
      await new Promise(r => setTimeout(r, 30));
    }

    function executeConfirm(result) {
        const callback = msgState.confirmCallback;
        closeMessageBox();
        if (result && callback) callback();
    }

    let state = {
      editingBooking: null,
      availableSlots: [],
      bookings: [],
      showSlotForm: false,
      showBookingForm: false,
      showHistoryModal: false,
      showReasonModal: false,
      showScheduleEditor: false,
      editingSlot: null,
      currentDate: new Date(),
      selectedDate: null,
      loading: false,
      syncing: false,
      selectedBookingId: null,
      cancelReason: '',
      cancelReasonType: '',
      slotForm: { date: '', startTime: '', endTime: '', room: '', consultTeacher: '', testTeacher: ''}, // ✨ 2개 필드 추가
      bookingForm: {
          studentName: '',
          school: '',
          grade: 'elementary1',
          hasLevelTest: false,
          date: '',
          time: '',
          room: '',
          consultMode: 'in_person',
          testRoom: ''
      }
    };

    const gradeLabels = {
      elementary: '초등',
      middle: '중등',
      high: '고등',
      elementary1: '초1',
      elementary2: '초2',
      elementary3: '초3',
      elementary4: '초4',
      elementary5: '초5',
      elementary6: '초6',
      middle1: '중1',
      middle2: '중2',
      middle3: '중3',
      high1: '고1',
      high2: '고2',
      high3: '고3',
      unknown: '모름'
    };

    // 운영시간 설정
    const centerHours = {
      '2관': { weekday: ['15:00','22:00'], weekend: ['10:00','21:00'] },
      '5관': { weekday: ['15:00','22:00'], weekend: ['10:00','21:00'] }
    };

    // 고정 일정 템플릿
      let fixedSchedule = {
      1: [ // 월요일
        { room: '하안관', startTime: '15:10', endTime: '16:30', consultTeacher: '한동용', testTeacher: '박나영'},
        { room: '하안관', startTime: '20:00', endTime: '22:00', consultTeacher: '한동용', testTeacher: '박나영'},
        { room: '철산관', startTime: '15:30', endTime: '16:10', consultTeacher: '한동용', testTeacher: '첨삭'},
        { room: '철산관', startTime: '20:30', endTime: '22:00', consultTeacher: '한동용', testTeacher: '첨삭'}
      ],
      2: [ // 화요일
        { room: '하안관', startTime: '15:10', endTime: '21:00', consultTeacher: '한승민', testTeacher: '첨삭'}
      ],
      3: [ // 수요일
        { room: '하안관', startTime: '15:10', endTime: '18:00', consultTeacher: '한동용', testTeacher: '박나영'},
        { room: '철산관', startTime: '15:30', endTime: '17:30', consultTeacher: '한동용', testTeacher: '첨삭'}
      ],
      4: [ // 목요일
        { room: '철산관', startTime: '15:10', endTime: '21:00', consultTeacher: '한승민', testTeacher: '한승민'}
      ],
      5: [ // 금요일
        { room: '하안관', startTime: '15:10', endTime: '16:30', consultTeacher: '한동용', testTeacher: '박나영'},
        { room: '하안관', startTime: '18:00', endTime: '20:00', consultTeacher: '한동용', testTeacher: '박나영'},
        { room: '철산관', startTime: '15:30', endTime: '16:10', consultTeacher: '한동용', testTeacher: '김동민'},
        { room: '철산관', startTime: '18:30', endTime: '19:30', consultTeacher: '한동용', testTeacher: '첨삭'}
      ],
      6: [ // 토요일
        { room: '철산관', startTime: '10:30', endTime: '12:30', consultTeacher: '한동용', testTteacher: '첨삭'}

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function getOneMonthAgo() {
      const date = new Date();
      date.setMonth(date.getMonth() - 1);
      return formatDate(date);
    }

    function isWeekend(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const day = d.getDay();
      return day === 0 || day === 6;
    }

    function getOpenWindow(dateStr, hallPrefix) {
      const cfg = centerHours[hallPrefix];
      if (!cfg) return null;
      const key = isWeekend(dateStr) ? 'weekend' : 'weekday';
      const v = cfg[key];
      if (!v || v.length !== 2) return null;
      return [v[0], v[1]];
    }

    function timeToMins(time) {
      if (time == null) return NaN;
      if (time instanceof Date) return time.getHours() * 60 + time.getMinutes();
      const s = String(time);
      const m = s.match(/(\d{1,2}):(\d{2})(?!.*\d)/);
      if (!m) return NaN;
      const h = parseInt(m[1], 10), mm = parseInt(m[2], 10);
      if (!Number.isFinite(h) || !Number.isFinite(mm)) return NaN;
      return h * 60 + mm;
    }

    function minsToTime(mins) {
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    }

    function addMinutesToTime(time, minutes) {
      return minsToTime(timeToMins(time) + minutes);
    }

    const norm = v => String(v||'').replace(/\s+/g,'').trim();

    async function loadFromGoogleSheets() {
      state.loading = true;
      render();
    
      const oneMonthAgo = getOneMonthAgo();
      const toArray = (x) => Array.isArray(x)
        ? x
        : (Array.isArray(x?.bookings) ? x.bookings
        : (Array.isArray(x?.data) ? x.data : []));
      
      function toISODateStr(s) {
        if (!s) return '';
        if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
      
        let m = s.match(/^\s*(\d{4})[.\-/]\s*(\d{1,2})[.\-/]\s*(\d{1,2})/);
        if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
      
        m = s.match(/^\s*(\d{1,2})[.\-/]\s*(\d{1,2})[.\-/]\s*(\d{4})/);
        if (m) return `${m[3]}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
      
        const d = new Date(s);
        if (!isNaN(d)) {
          const y = d.getFullYear();
          const m2 = String(d.getMonth()+1).padStart(2,'0');
          const dd = String(d.getDate()).padStart(2,'0');
          return `${y}-${m2}-${dd}`;
        }
        return '';
      }
      
      const isRecent = (d) => {
        const iso = toISODateStr(d);
        return iso && iso >= oneMonthAgo;
      };
    
      const normalizeSlot = (s) => ({
        ...s,
        date: toISODateStr((s?.date ?? '').toString().trim()),
        id: s?.id ?? '',
        room: (s?.room || '').replace('5관테스트실', '5관')
      });
    
      const normalizeBooking = (b) => {
        const rawGrade = (b?.grade ?? '').toString().trim();
        return {
          ...b,
          id: b?.id ?? '',
          date: toISODateStr((b?.date ?? '').toString().trim()),
          time: b?.time ?? b?.startTime ?? '',
          endTime: b?.endTime ?? '',
          room: (b?.room || '').replace('5관테스트실', '5관'),
          consultTime: b?.consultTime ?? '',
          status: b?.status ?? 'scheduled',
          cancelReason: b?.cancelReason ?? '',
          completedAt: b?.completedAt ?? '',
          grade: rawGrade,
          _isElementary:
            rawGrade.startsWith('elementary') ||
            rawGrade === 'elementary' ||
            ['초','초1','초2','초3','초4','초5','초6'].some(k => rawGrade.includes(k)),
        };
      };
    
      try {
        const slotsResponse = await fetch(`${GOOGLE_SCRIPT_URL}?sheet=slots&ts=${Date.now()}`, {cache: 'no-store'});
        const slotsRaw = await slotsResponse.json();
        const slotsArr = toArray(slotsRaw).map(normalizeSlot);
        state.availableSlots = slotsArr.filter(s => s.id && isRecent(s.date));
    
        const bookingsResponse = await fetch(`${GOOGLE_SCRIPT_URL}?sheet=bookings&ts=${Date.now()}`, {cache: 'no-store'});
        const bookingsRaw = await bookingsResponse.json();
        const bookingsArr = toArray(bookingsRaw).map(normalizeBooking);
        state.bookings = bookingsArr.filter(b => b.id && isRecent(b.date));
    
        state.bookings.sort((a, b) => (a.date + a.time + a.room).localeCompare(b.date + b.time + b.room));
    
        try { await cleanupOldData(oneMonthAgo); } catch (e) { console.warn('cleanupOldData failed:', e); }
      } catch (err) {
        console.error('loadFromGoogleSheets error:', err);
        state.availableSlots = state.availableSlots || [];
        state.bookings = state.bookings || [];
      } finally {
        state.loading = false;
        if (!state.selectedDate) {
          state.selectedDate = formatDate(new Date());
        }
        render();
      }
    }
   
    async function cleanupOldData(cutoffDate) {
      try {
        const oldSlots = (state.availableSlots || []).filter(slot => slot.date < cutoffDate && slot.id);
        const oldBookings = (state.bookings || []).filter(booking => booking.date < cutoffDate && booking.id);
        
        for (let slot of oldSlots) {
          await deleteFromGoogleSheets('slots', slot.id);
        }
        
        for (let booking of oldBookings) {
          await deleteFromGoogleSheets('bookings', booking.id);
        }
        
        if (oldSlots.length > 0 || oldBookings.length > 0) {
          console.log('1달 이전 데이터 삭제 완료');
        }
      } catch (error) {
        console.error('데이터 정리 실패:', error);
      }
    }

    async function addToGoogleSheets(sheet, data) {
      const params = new URLSearchParams();
      params.append('sheet', sheet);
      params.append('action', 'add');
      params.append('data', JSON.stringify(data));
    
      await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
        },
        body: params.toString()
      });
    
      await loadFromGoogleSheets();
      handleDateClick(state.selectedDate, false);
    }


    async function updateInGoogleSheets(sheet, id, data) {
      const params = new URLSearchParams();
      params.append('sheet', sheet);
      params.append('action', 'update');
      params.append('id', id);
      params.append('data', JSON.stringify(data));
    
      await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
        },
        body: params.toString()
      });
    
      await loadFromGoogleSheets();
      handleDateClick(state.selectedDate, false);
    }


    async function deleteFromGoogleSheets(sheet, id) {
      const params = new URLSearchParams();
      params.append('sheet', sheet);
      params.append('action', 'delete');
      params.append('id', id);
    
      await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
        },
        body: params.toString()
      });
    
      await loadFromGoogleSheets();
      handleDateClick(state.selectedDate, false);
    }


    function openSlotForm(date) {
      state.slotForm.date = date;
      state.slotForm.room = '';              // ✨ 빈 값으로 초기화
      state.slotForm.consultTeacher = '';           // ✨ 추가
      state.slotForm.testTeacher = ''; 
      state.showSlotForm = true;
      render();
    }

    async function addSlot() {
      if (!state.slotForm.date || !state.slotForm.startTime || !state.slotForm.endTime || !state.slotForm.room) {
        showCustomAlert('모든 필드를 입력해주세요.');
        return;
      }
      
      if (timeToMins(state.slotForm.startTime) >= timeToMins(state.slotForm.endTime)) {
        showCustomAlert('종료 시간이 시작 시간보다 늦어야 합니다.');
        return;
      }

      await setSyncing(true);
      
      try {
        const newSlot = {
          id: Date.now().toString(),
          date: state.slotForm.date,
          startTime: state.slotForm.startTime,
          endTime: state.slotForm.endTime,
          room: state.slotForm.room,
          consultTeacher: state.slotForm.consultTeacher || '',           // ✨ 추가
          testTeacher: state.slotForm.testTeacher || '',
        };
        await addToGoogleSheets('slots', newSlot);
        
        state.slotForm = { date: '', startTime: '', endTime: '', room: '' };
        state.showSlotForm = false;
        showCustomAlert('저장되었습니다!');
      } catch (error) {
        console.error('에러:', error);
        showCustomAlert('저장 실패!');
      } finally {
        await setSyncing(false);
      }
    }

    function openScheduleEditor() {
      state.showScheduleEditor = true;
      render();
    }

    function updateScheduleTeacher(dayNum, idx, field, value) {
      fixedSchedule[dayNum][idx][field] = value;
      // 로컬스토리지에 저장
      try { localStorage.setItem('fixedSchedule', JSON.stringify(fixedSchedule)); } catch(e) {}
    }

    function loadSavedSchedule() {
      try {
        const saved = localStorage.getItem('fixedSchedule');
        if (saved) {
          const parsed = JSON.parse(saved);
          // 기존 키 구조 유지하면서 병합
          for (const day in parsed) {
            if (fixedSchedule[day]) {
              parsed[day].forEach((s, i) => {
                if (fixedSchedule[day][i]) {
                  fixedSchedule[day][i].consultTeacher = s.consultTeacher ?? fixedSchedule[day][i].consultTeacher;
                  fixedSchedule[day][i].testTeacher = s.testTeacher ?? fixedSchedule[day][i].testTeacher;
                }
              });
            }
          }
        }
      } catch(e) {}
    }

          html += '</div>';

          html += '<div class="flex-1">';
          html += '<label class="block text-xs text-gray-500 mb-1">테스트 담당</label>';
          html += '<input type="text" value="' + (slot.testTeacher || slot.testTteacher || '') + '" oninput="updateScheduleTeacher(' + day + ',' + idx + ',\'testTeacher\',this.value)" class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400" placeholder="이름">';
          html += '</div>';

        });

      }

      html += '</div>';

      html += '<button onclick="state.showScheduleEditor=false; render();" class="px-5 py-2 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition shadow-md">✓ 닫기</button>';
      html += '</div>';

      return html;
    }

    async function applyFixedSchedule() {
      console.log('applyFixedSchedule 호출됨');
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      const today = formatDate(new Date());
      const slotsToAdd = [];
      let skippedCount = 0;
      let pastDateCount = 0;
      
      console.log('오늘 날짜:', today);
      console.log('처리할 월:', year + '년 ' + (month + 1) + '월');
      
      // i를 날짜(1일부터 마지막 날까지)로 사용합니다.
      for (let i = 1; i <= daysInMonth; i++) {
        // 1. 먼저 date 객체를 만듭니다.
        const dateObj = new Date(year, month, i); 
        // 2. 이 객체로 dateStr(문자열 날짜)을 만듭니다.
        const dateStr = formatDate(dateObj);
        // 3. 요일을 가져옵니다.
        const dayOfWeek = dateObj.getDay();
        
        if (dateStr < today) {
          console.log('과거 날짜 스킵:', dateStr);
          pastDateCount++;
          continue;
        }
        
        const schedules = fixedSchedule[dayOfWeek];
        if (!schedules) continue;
        
        const existingSlots = state.availableSlots.filter(s => s.date === dateStr);
        
        for (const schedule of schedules) {
          const isDuplicate = existingSlots.some(s =>
            s.room === schedule.room &&
            s.startTime === schedule.startTime &&
            s.endTime === schedule.endTime
          );
          
          if (isDuplicate) {
            skippedCount++;
          } else {
            slotsToAdd.push({
              // 여기서 i(현재 날짜)를 사용하여 ID를 만듭니다.
              id: `${Date.now()}_${i}_${schedule.room}_${schedule.startTime.replace(':', '')}`,
              date: dateStr,
              room: schedule.room,
              startTime: schedule.startTime,
              endTime: schedule.endTime,
              consultTeacher: schedule.consultTeacher,           // ✨ 추가
              testTeacher: schedule.testTeacher
            });
          }
        }
      }

      if (slotsToAdd.length === 0) {
        const msg = pastDateCount > 0 
          ? `이미 모든 고정 일정이 등록되어 있습니다.\n(${skippedCount}개 중복, ${pastDateCount}개 과거 날짜)`
          : `이미 모든 고정 일정이 등록되어 있습니다.\n(${skippedCount}개 건너뜀)`;
        showCustomAlert(msg);
        return;
      }
      
      const message =
        `${year}년 ${month + 1}월에 ${slotsToAdd.length}개의 고정 일정을 추가하시겠습니까?\n` +
        `(${skippedCount}개는 이미 존재하여 건너뜀)\n\n`;
      
      showCustomConfirm(message, async () => {
        await setSyncing(true);
      
        // 🔹 시작 알림
        showCustomAlert(`고정 일정을 적용하는 중입니다...\n\n진행: 0 / ${slotsToAdd.length}`);
      
        let successCount = 0;
        let failCount = 0;
      
        try {
          let progress = 0;
      
          for (const slot of slotsToAdd) {
            try {
              const formData = new FormData();
              formData.append('sheet', 'slots');
              formData.append('action', 'add');
              formData.append('data', JSON.stringify(slot));
      
              await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: formData
              });
      
              successCount++;
            } catch (err) {
              failCount++;
            }
      
            // 🔹 진행 상황 업데이트
            progress++;
            closeMessageBox();

    function getAvailableTimes() {
      if (!state.bookingForm.date) return [];
      const dateStr = state.bookingForm.date;
      const step = 5;
      const CONSULT_DURATION = 30;
    
      // ✨ 수정 모드인 경우 원래 예약 정보 가져오기
      let editingBookingData = null;
      if (state.editingBooking) {
        editingBookingData = state.bookings.find(b => String(b.id) === String(state.editingBooking));
      }

      const g = String(state.bookingForm.grade||'').trim();
      const isElementary = g.startsWith('elementary') || g==='elementary' ||
        ['초','초1','초2','초3','초4','초5','초6'].some(k=>g.includes(k));
      const levelTestMins = state.bookingForm.hasLevelTest ? (isElementary?40:50) : 0;

      const isPhone = (state.bookingForm.consultMode === 'phone');
      const isTestOnly = (isPhone && state.bookingForm.hasLevelTest);

      const slotsAll = (state.availableSlots||[]).filter(s => (s.date||'')===dateStr);
      
      const bookings = (state.bookings||[])
        .filter(r => (r.date||'')===dateStr)
        .filter(r => !editingBookingData || String(r.id) !== String(editingBookingData.id)) // 수정 중인 예약 제외
        .map(r => ({
          room: norm(r.room),
          startM: timeToMins(r.time),
          endM: timeToMins(r.endTime)
        }));

      const out = new Set();

      if (isTestOnly) {
        const chosen = norm(state.bookingForm.testRoom);
        if (!chosen) return [];

        const win = getOpenWindow(dateStr, chosen);
        if (!win) return [];

        const sM = timeToMins(win[0]);
        const eM = timeToMins(win[1]);
        const required = levelTestMins + CONSULT_DURATION;

        for (let tStart = sM; tStart <= eM - required; tStart += step) {
          const tEnd = tStart + required;
          let conflict = false;
          for (const r of bookings) {
            if (r.room.startsWith(chosen)) {
              if (!(tEnd <= r.startM || tStart >= r.endM)) {
                conflict = true;
                break;
              }
            }
          }
          if (!conflict) out.add(minsToTime(tStart));
        }
        return Array.from(out).sort();
      }

      // 전화상담(레벨테스트 없음): 관 선택 없이 모든 슬롯에서 시간 추출
      const consultSlots = isPhone
        ? slotsAll  // 모든 슬롯 사용 (관 제한 없음)
        : slotsAll.filter(s => norm(s.room)===norm(state.bookingForm.room));

      for (const slot of consultSlots) {
        const sM = timeToMins(slot.startTime);
        const eM = timeToMins(slot.endTime);
        if (!Number.isFinite(sM)||!Number.isFinite(eM)||eM<=sM) continue;

        for (let tStart = sM; tStart <= eM - CONSULT_DURATION; tStart += step) {
          const tEnd = tStart + CONSULT_DURATION;
          let conflict = false;
          for (const r of bookings) {
            if (isPhone) {
              // 전화상담은 같은 관의 기존 전화상담 예약과만 충돌 체크
              if (r.room === '전화상담' || r.room === norm(slot.room)) {
                if (!(tEnd <= r.startM || tStart >= r.endM)) {
                  conflict = true;
                  break;
                }
              }
            } else {
              if (r.room === norm(state.bookingForm.room)) {
                if (!(tEnd <= r.startM || tStart >= r.endM)) {
                  conflict = true;
                  break;
                }
              }
            }
          }
          if (!conflict) out.add(minsToTime(tStart));
        }
      }
      return Array.from(out).sort();
    }

    async function addBooking() {
      const f = state.bookingForm;
      const isPhone = (f.consultMode === 'phone');
      const isTestOnly = (isPhone && f.hasLevelTest);

      if (!f.studentName || !f.date || !f.time) {
        return showCustomAlert('모든 필드를 입력해주세요.');
      }
      if (!isPhone && !f.room) {
        return showCustomAlert('상담실을 선택해주세요.');
      }
      if (isTestOnly && !f.testRoom) {
        return showCustomAlert('레벨테스트 장소(2관/5관)를 선택해주세요.');
      }
      if (f.hasLevelTest && f.grade === 'unknown') {
        return showCustomAlert('학년을 모르는 경우 레벨테스트 시간을 정확히 계산할 수 없습니다.');
      }

      const g = String(f.grade||'').trim();
      const isElementary = g.startsWith('elementary') || g === 'elementary' ||
        ['초','초1','초2','초3','초4','초5','초6'].some(k=>g.includes(k));
      const levelTestMins = f.hasLevelTest ? (isElementary ? 40 : 50) : 0;

      let consultTime, startTime, endTime;

      if (isTestOnly) {
        startTime = f.time;
        consultTime = addMinutesToTime(f.time, levelTestMins);
        endTime = addMinutesToTime(consultTime, 30);
      } else {
        consultTime = f.time;
        const consultEndTime = addMinutesToTime(consultTime, 30);
        startTime = levelTestMins > 0 ? addMinutesToTime(consultTime, -levelTestMins) : consultTime;
        endTime = consultEndTime;
      }

      const candidates = getAvailableTimes();
      if (!candidates.includes(f.time)) {
        return showCustomAlert('선택한 시간은 예약 규칙(상담/테스트 슬롯, 충돌)과 맞지 않습니다.');
      }

      await setSyncing(true);

      try {
        const bookingData = {
          studentName: f.studentName,
          school: f.school || '모름',
          grade: f.grade,
          hasLevelTest: f.hasLevelTest,
          date: f.date,
          time: startTime,
          endTime: endTime,
          consultTime: consultTime,
          status: 'scheduled',
          consultMode: f.consultMode,
          testRoom: f.hasLevelTest ? f.testRoom : '',
          consultRoom: f.consultMode==='in_person' ? f.room : '전화상담',
          room: f.hasLevelTest ? (f.testRoom || f.room || '') : (f.consultMode==='in_person' ? f.room : '전화상담')
        };

        if (state.editingBooking) {
          const existing = state.bookings.find(b => String(b.id) === String(state.editingBooking));
          if (!existing) {
            showCustomAlert('수정할 예약을 찾을 수 없습니다.');
            await setSyncing(false);
            return;
          }
          await updateInGoogleSheets('bookings', state.editingBooking, { ...existing, ...bookingData });
          showCustomAlert('예약이 수정되었습니다!');
        } else {
          const newBooking = { id: Date.now().toString(), ...bookingData };
          await addToGoogleSheets('bookings', newBooking);
          showCustomAlert('예약이 등록되었습니다!');
        }

        state.showBookingForm = false;
        state.editingBooking = null;
        render();
      } catch (e) {
        console.error(e);
        showCustomAlert('예약 처리 실패!');
      } finally {
        await setSyncing(false);
      }
    }

    async function updateBookingStatus(id, status, reason = '') {
      await setSyncing(true);
      
      try {
        const booking = state.bookings.find(b => String(b.id) === String(id));
        if (!booking) return;
        
        const updatedBooking = {
          ...booking,
          status: status,
          cancelReason: reason || '',
          completedAt: status === 'completed' ? new Date().toISOString() : booking.completedAt
        };
        
        await updateInGoogleSheets('bookings', id, updatedBooking);
        
        showCustomAlert(status === 'completed' ? '완료 처리되었습니다!' : '미진행 처리되었습니다!');
      } catch (error) {

      } finally {
        state.showReasonModal = false;

    function renderCalendar() {
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startingDayOfWeek = firstDay.getDay();
      const today = formatDate(new Date());
      const oneMonthAgo = getOneMonthAgo();
      
      let html = '';
      
      for (let i = 0; i < startingDayOfWeek; i++) {
        html += '<div class="h-20"></div>';
      }
      
      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(year, month, day);
        const dateStr = formatDate(date);
        const hasSlots = state.availableSlots.some(slot => slot.date === dateStr);
        const hasBooking = state.bookings.some(booking => booking.date === dateStr);
        const isSelected = state.selectedDate === dateStr;
        const isToday = dateStr === today;
        const isPast = dateStr < today;
        const isTooOld = dateStr < oneMonthAgo;
        
        let classes = 'h-20 border p-2 transition rounded-lg overflow-hidden ';
        if (isTooOld) {
          classes += 'bg-gray-100 opacity-50 text-gray-400 cursor-default';
        } else if (isPast) {
          classes += 'bg-gray-200 cursor-pointer opacity-70';
        } else if (isSelected) {
          classes += 'bg-indigo-200 border-indigo-600 ring-2 ring-indigo-400 cursor-pointer shadow-md';
        } else if (hasSlots || hasBooking) {
          classes += 'bg-white hover:bg-green-100 cursor-pointer shadow-sm border-gray-200';
        } else {
          classes += 'bg-white hover:bg-gray-50 cursor-pointer shadow-sm border-gray-200';
        }
        if (isToday) classes += ' ring-2 ring-blue-500 ring-offset-2';
        
        html += '<div class="' + classes + '" onclick="handleDateClick(\'' + dateStr + '\', ' + (isPast && !isTooOld) + ')">';
        html += '<div class="font-semibold text-sm ' + (isPast ? 'text-gray-500' : 'text-gray-800') + '">' + day + '</div>';
        html += '<div class="flex justify-center gap-1 mt-1">';

          html += '<div title="예약 있음" class="w-3 h-3 bg-blue-500 rounded-full"></div>';

      const endHour = 22;
      
      for (let h = startHour; h <= endHour; h++) {
        for (let m = 0; m < 60; m += 5) {
          const time = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');

      }

          const g = String(state.bookingForm.grade || '').trim();
          const isElem = g.startsWith('elementary') || g === 'elementary' || ['초','초1','초2','초3','초4','초5','초6'].some(k => g.includes(k));
          
          if (isTestOnly) {
            const L = isElem ? 40 : 50;
            const consultStart = addMinutesToTime(state.bookingForm.time, L);
            const consultEnd = addMinutesToTime(consultStart, 30);
            html += '<div class="text-sm text-blue-700 p-3 bg-blue-100 rounded-lg">';
            html += '레벨테스트: ' + state.bookingForm.time + ' - ' + consultStart + ' (' + L + '분)<br>';
            html += '전화상담: ' + consultStart + ' - ' + consultEnd + ' (30분)<br>';
            html += '총 예약 시간: ' + state.bookingForm.time + ' - ' + consultEnd + ' (' + (L + 30) + '분)';
            html += '</div>';
          } else if (state.bookingForm.hasLevelTest) {
            const levelTestMins = isElem ? 40 : 50;
            const consultStart = state.bookingForm.time;
            const testStart = addMinutesToTime(consultStart, -levelTestMins);
            const consultEnd = addMinutesToTime(state.bookingForm.time, 30);
            html += '<div class="text-sm text-blue-700 p-3 bg-blue-100 rounded-lg">';
            html += '레벨테스트: ' + testStart + ' - ' + consultStart + ' (' + levelTestMins + '분)<br>';
            html += '상담: ' + consultStart + ' - ' + consultEnd + ' (30분)<br>';
            html += '총 예약 시간: ' + testStart + ' - ' + consultEnd + ' (' + (levelTestMins + 30) + '분)';
            html += '</div>';
          } else {
            const consultEnd = addMinutesToTime(state.bookingForm.time, 30);
            html += '<div class="text-sm text-blue-700 p-3 bg-blue-100 rounded-lg">';
            html += '총 예약 시간: ' + state.bookingForm.time + ' - ' + consultEnd + ' (30분' + (isPhone?' · 전화상담':'') + ')';
            html += '</div>';
          }
        }
        
        html += '</div>';

        html += '<div class="flex justify-end gap-3 mt-8">';
        html += '<button type="button" onclick="state.showBookingForm=false; render();" ' + (state.syncing ? 'disabled' : '') + ' class="px-4 py-2 rounded-lg border disabled:opacity-50">취소</button>';
        html += '<button type="button" onclick="addBooking()" ' + (state.syncing ? 'disabled' : '') + ' class="px-4 py-2 rounded-lg bg-indigo-600 text-white shadow disabled:opacity-50">' + (state.editingBooking ? '수정' : '등록') + '</button>';
        html += '</div>';
        html += '</div></div>';
      }

      if (state.showReasonModal) {
        const reasonOptions = [
          { value: '입력 오류', label: '잘못 입력된 예약' },
          { value: '학생 불참', label: '학생 불참 (노쇼)' },
          { value: '예약 취소', label: '사전 예약 취소' },
          { value: '기타', label: '기타 (직접 입력)' }
        ];
        
        html += '<div class="fixed inset-0 bg-gray-900 bg-opacity-75 z-50 flex items-center justify-center p-4" onclick="if(event.target.classList.contains(\'bg-opacity-75\')) { state.showReasonModal = false; render(); }">';
        html += '<div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 transform transition-all scale-100">';
        html += '<h3 class="text-xl font-bold text-gray-800 mb-4">❌ 미진행 사유 선택</h3>';
        
        html += '<div class="space-y-4">';
        html += '<div><label class="block text-sm font-medium text-gray-700 mb-2">사유 유형</label>';
        html += '<select onchange="state.cancelReasonType = this.value; render();" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500" required>';
        html += '<option value="">선택해주세요</option>';
        reasonOptions.forEach(opt => {
          html += '<option value="' + opt.value + '" ' + (state.cancelReasonType === opt.value ? 'selected' : '') + '>' + opt.label + '</option>';
        });
        html += '</select></div>';
        
        if (state.cancelReasonType === '기타') {
          html += '<div><label class="block text-sm font-medium text-gray-700 mb-2">상세 사유</label>';
          html += '<textarea oninput="state.cancelReason = this.value;" rows="3" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-orange-500 focus:border-orange-500" placeholder="미진행 사유를 입력해주세요." required>' + state.cancelReason + '</textarea></div>';
        }
        html += '</div>';

        html += '<div class="flex justify-end gap-3 mt-6">';
        html += '<button onclick="state.showReasonModal = false; state.selectedBookingId = null; state.cancelReason = \'\'; state.cancelReasonType = \'\'; render();" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-xl font-semibold hover:bg-gray-300 transition shadow-md">취소</button>';
        const isDisabled = !state.cancelReasonType || (state.cancelReasonType === '기타' && !state.cancelReason.trim());
        html += '<button onclick="submitCancelReason()" ' + (state.syncing || isDisabled ? 'disabled' : '') + ' class="px-4 py-2 bg-orange-500 text-white rounded-xl font-semibold hover:bg-orange-600 transition disabled:opacity-50 shadow-md">미진행 처리</button>';
        html += '</div>';
        html += '</div></div>';
      }

      if (state.showHistoryModal) {
        const historyBookings = state.bookings.filter(b => b.status !== 'scheduled').sort((a, b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time));

        html += '<div class="fixed inset-0 bg-gray-900 bg-opacity-75 z-40 flex items-center justify-center p-4" onclick="if(event.target.classList.contains(\'bg-opacity-75\')) { state.showHistoryModal = false; render(); }">';
        html += '<div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full h-3/4 flex flex-col p-6 md:p-8 transform transition-all scale-100">';
        html += '<h3 class="text-2xl font-bold text-gray-800 mb-4">📋 지난 상담 내역 (' + historyBookings.length + '건)</h3>';
        
        html += '<div class="flex-1 overflow-y-auto space-y-3 pr-2">';
        
        if (historyBookings.length === 0) {
          html += '<p class="text-gray-500 text-center py-10">완료되거나 미진행된 상담 내역이 없습니다. (최근 1개월)</p>';
        } else {
          for (let booking of historyBookings) {
            const isCompleted = booking.status === 'completed';
            const statusClass = isCompleted ? 'border-green-400 bg-green-50' : 'border-red-400 bg-red-50';
            const statusText = isCompleted ? '✓ 완료' : '✗ 미진행';
            
            html += '<div class="border-l-4 ' + statusClass + ' p-3 rounded-lg shadow-sm">';
            html += '<div class="flex justify-between items-start">';
            html += '<div>';
            html += '<div class="text-sm font-semibold text-gray-800">' + booking.date + ' | ' + booking.room + ' | ' + gradeLabels[booking.grade] + ' ' + booking.studentName + '</div>';
            html += '<div class="text-xs text-gray-600 mt-1">🕐 ' + booking.time + ' - ' + booking.endTime + ' | ' + (booking.hasLevelTest ? '레벨테스트 포함' : '상담만') + '</div>';
            if (!isCompleted && booking.cancelReason) {
              html += '<p class="text-xs text-red-700 mt-2 p-1 bg-red-100 rounded">사유: ' + booking.cancelReason + '</p>';
            }
            html += '</div>';
            html += '<div class="text-sm font-bold ' + (isCompleted ? 'text-green-600' : 'text-red-600') + '">' + statusText + '</div>';
            html += '</div>';
            html += '</div>';
          }
        }
        
        html += '</div>';
        
        html += '<div class="flex justify-end mt-6">';
        html += '<button onclick="state.showHistoryModal = false; render();" class="px-4 py-2 bg-indigo-500 text-white rounded-xl font-semibold hover:bg-indigo-600 transition shadow-md">닫기</button>';
        html += '</div>';
        html += '</div></div>';
      }

      if (state.showScheduleEditor) {
        html += renderScheduleEditor();
      }

      html += renderMessageBox();

      document.getElementById('app').innerHTML = html;
    }

    function renderMessageBox() {
      let html = '';

      // 저장 중 오버레이
      if (state.syncing) {
        html += `
          <div class="fixed inset-0 bg-gray-900 bg-opacity-60 z-[98] flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-2xl px-10 py-8 flex flex-col items-center gap-4">
              <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
              <p class="text-lg font-bold text-gray-800">저장 중입니다...</p>
              <p class="text-sm text-gray-500">잠시만 기다려 주세요.</p>
            </div>
          </div>
        `;
      }

      if (!msgState.show) return html;
      
      html += `
        <div class="fixed inset-0 bg-gray-900 bg-opacity-75 z-[99] flex items-center justify-center p-4">
          <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-6 transform transition-all scale-100">
            <h3 class="text-xl font-bold text-gray-800 mb-4">${msgState.type === 'alert' ? '알림' : '확인'}</h3>
            <p class="text-gray-700 mb-6 whitespace-pre-line leading-relaxed">${msgState.message}</p>
            <div class="flex justify-end gap-3">
              ${msgState.type === 'confirm' ? `<button onclick="executeConfirm(false)" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-xl font-semibold hover:bg-gray-300 transition shadow-md">취소</button>` : ''}
              <button onclick="executeConfirm(true)" class="px-4 py-2 bg-indigo-500 text-white rounded-xl font-semibold hover:bg-indigo-600 transition shadow-md">${msgState.type === 'alert' ? '확인' : '계속'}</button>
            </div>
          </div>
        </div>
      `;
      return html;
    }

    window.onload = async function () {
      loadSavedSchedule();
      await loadFromGoogleSheets();
      const today = formatDate(new Date());
      handleDateClick(today, false);
    };

  </script>
</body>
</html>
